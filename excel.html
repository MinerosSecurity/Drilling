<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Perforación - Mineros Nicaragua</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #004d40; --accent: #deff9a; --back: #00bbff;
            --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc;
            --border: rgba(222, 255, 154, 0.1);
            --red: #ef5350;
        }

        body { font-family: 'Urbanist', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }

        header { 
            background: linear-gradient(90deg, var(--primary), #002d26); 
            padding: 15px 25px; border-radius: 10px; border-bottom: 4px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .status-bar {
            background: rgba(255,255,255,0.03); padding: 12px 25px; border-radius: 12px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; font-size: 12px;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; background: #666; transition: 0.3s; }
        .dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .dot.syncing { background: var(--back); box-shadow: 0 0 10px var(--back); animation: pulse 1.5s infinite; }
        .dot.error { background: var(--red); box-shadow: 0 0 10px var(--red); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* KPIs */
        .kpi-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--card-bg); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .kpi-value { font-size: 26px; font-weight: 800; color: var(--accent); display: block; }
        .kpi-value2 { font-size: 26px; font-weight: 800; color: var(--back); display: block; }
        .kpi-label { font-size: 10px; text-transform: uppercase; opacity: 0.7; margin-top: 5px; }

        /* Barras de Target */
        .panel-card { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        .target-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .target-label { flex: 0 0 160px; font-size: 11px; font-weight: 600; color: #94a3b8; text-align: right; text-transform: uppercase; }
        .target-rail { flex-grow: 1; height: 10px; background: #334155; border-radius: 5px; overflow: hidden; }
        .target-fill { height: 100%; background: linear-gradient(90deg, #2196f3, var(--back)); transition: width 1.5s ease-out; width: 0; }
        .target-val { flex: 0 0 80px; font-size: 12px; font-weight: 800; color: var(--back); }

        /* Tabla */
        .sondeo-table { width: 100%; border-collapse: collapse; }
        .sondeo-table th { text-align: left; padding: 12px; font-size: 11px; text-transform: uppercase; color: #94a3b8; border-bottom: 2px solid var(--border); }
        .row-main td { padding: 15px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .row-main:hover { background: rgba(0, 187, 255, 0.05); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="font-weight: 800; margin:0; letter-spacing: -1px;">CENTRO DE CONTROL <span>H2</span></h1>
        <h5 id="lastSync" style="opacity: 0.6; margin:0; font-size: 11px;">Sincronización Automática GitHub Cloud</h5>
    </div>
    <div style="font-weight: bold; color: var(--accent);">MINEROS NICARAGUA</div>
</header>

<div class="status-bar">
    <div id="statusDot" class="dot"></div>
    <span id="statusMsg">Iniciando conexión con Google Sheets...</span>
</div>

<!-- KPIs -->
<div class="kpi-container">
    <div class="kpi-card"><span class="kpi-value" id="kpi-exec">--</span><span class="kpi-label">Ejecutado Mayo</span></div>
    <div class="kpi-card"><span class="kpi-value2" id="kpi-near">--</span><span class="kpi-label">Near Mine</span></div>
    <div class="kpi-card"><span class="kpi-value2" id="kpi-expl">--</span><span class="kpi-label">Exploración</span></div>
    <div class="kpi-card"><span class="kpi-value2" id="kpi-porv">--</span><span class="kpi-label">Porvenir</span></div>
</div>

<div style="font-weight: 800; color: var(--accent); margin-bottom: 10px; font-size: 12px;">METROS POR SISTEMA</div>
<div class="panel-card" id="targetContainer">
    <p style="text-align:center; opacity:0.5;">Cargando objetivos operativos...</p>
</div>

<div style="font-weight: 800; color: var(--accent); margin-bottom: 10px; font-size: 12px;">SONDEOS ACTIVOS</div>
<div class="panel-card" style="padding:0;">
    <table class="sondeo-table">
        <thead>
            <tr><th>Proyecto</th><th>Sondeo</th><th>Metros</th><th>Estatus</th></tr>
        </thead>
        <tbody id="sondeosBody">
            <tr><td colspan="4" style="text-align:center; padding:20px; opacity:0.5;">Sincronizando tabla...</td></tr>
        </tbody>
    </table>
</div>

<script>
    /**
     * CONFIGURACIÓN DE ORIGEN DE DATOS
     */
    // 1. REEMPLAZA EL ID: Es el código largo en la URL de tu Google Sheet
    const SHEET_ID = '1-MRXYDaGuGpWSDAtonPFg3OECBkxr6F7'; 
    // 2. NOMBRE DE LA PESTAÑA: Tal cual aparece en Google Sheets
    const SHEET_NAME = 'TotalMetros'; 

    async function syncData() {
        if (SHEET_ID === ' '1-MRXYDaGuGpWSDAtonPFg3OECBkxr6F7') {
            updateStatus("⚠️ ID de hoja no configurado", "error");
            return;
        }

        updateStatus("Sincronizando...", "syncing");
        
        // El motor Gviz es más tolerante. Forzamos la actualización con un timestamp
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&t=${new Date().getTime()}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("No se pudo acceder al enlace de Google.");
            
            const text = await response.text();
            
            // Limpiar la respuesta basura de Google (/*O_o*/ google.visualization.Query.setResponse(...))
            const jsonString = text.match(/\{.*\}/s)[0];
            const json = JSON.parse(jsonString);

            if (json.status === "error") {
                throw new Error(json.errors[0].detailed_message || "Error en la consulta de datos.");
            }

            const rows = json.table.rows;

            // 1. MAPEANDO KPIs (Celdas B2, B3, B4, B5)
            // En el JSON, rows[0] es la fila 1. c[1] es la columna B.
            updateKPI('kpi-exec', rows[1]?.c[1]?.f || rows[1]?.c[1]?.v);
            updateKPI('kpi-near', rows[2]?.c[1]?.f || rows[2]?.c[1]?.v);
            updateKPI('kpi-expl', rows[3]?.c[1]?.f || rows[3]?.c[1]?.v);
            updateKPI('kpi-porv', rows[4]?.c[1]?.f || rows[4]?.c[1]?.v);

            // 2. MAPEANDO TARGETS (Columnas C y D, filas 2 a 12 para mayor cobertura)
            const targetCont = document.getElementById('targetContainer');
            targetCont.innerHTML = '';
            let hasTargets = false;
            for(let i=1; i<12; i++) {
                const label = rows[i]?.c[2]?.v; // Columna C
                const val = parseFloat(rows[i]?.c[3]?.v) || 0; // Columna D
                if(label) {
                    hasTargets = true;
                    const perc = Math.min((val / 4000) * 100, 100);
                    targetCont.innerHTML += `
                        <div class="target-row">
                            <span class="target-label">${label}</span>
                            <div class="target-rail"><div class="target-fill" style="width:${perc}%"></div></div>
                            <span class="target-val">${val.toLocaleString()} m</span>
                        </div>`;
                }
            }
            if (!hasTargets) targetCont.innerHTML = '<p style="text-align:center; opacity:0.5;">No se encontraron datos en columnas C y D.</p>';

            // 3. MAPEANDO TABLA DE SONDEOS (Desde fila 15 -> índice 14)
            const sondeoCont = document.getElementById('sondeosBody');
            sondeoCont.innerHTML = '';
            let hasSondeos = false;
            for(let i=14; i<rows.length; i++) {
                const proj = rows[i]?.c[0]?.v; // Columna A
                const sond = rows[i]?.c[1]?.v; // Columna B
                const mets = rows[i]?.c[2]?.f || rows[i]?.c[2]?.v || 0; // Columna C
                const stat = rows[i]?.c[3]?.v || 'Activo'; // Columna D
                if(proj && sond) {
                    hasSondeos = true;
                    sondeoCont.innerHTML += `
                        <tr class="row-main" onclick="this.classList.toggle('active')">
                            <td>${proj}</td><td><b>${sond}</b></td><td>${mets} m</td>
                            <td><span style="color:var(--teal)">● ${stat}</span></td>
                        </tr>`;
                }
            }
            if (!hasSondeos) sondeoCont.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; opacity:0.5;">No hay sondeos activos (revisa desde fila 15).</td></tr>';

            updateStatus("Sincronizado", "online");
            document.getElementById('lastSync').innerText = "Actualizado: " + new Date().toLocaleTimeString();

        } catch (e) {
            updateStatus("Error de datos", "error");
            console.error("Detalle del error:", e);
            document.getElementById('statusMsg').innerText = "Error: " + e.message;
        }
    }

    function updateKPI(id, val) {
        const el = document.getElementById(id);
        if(el && val !== undefined && val !== null) {
            el.innerText = isNaN(val) ? val : parseFloat(val).toLocaleString() + " m";
        }
    }

    function updateStatus(msg, type) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusMsg');
        text.innerText = msg;
        dot.className = "dot " + type;
    }

    // Iniciar y refrescar cada 2 minutos
    syncData();
    setInterval(syncData, 120000);
</script>

</body>
</html>
